<!DOCTYPE html>
<html>
<head>
  <title>PC Builder 💻</title>
</head>
<body>

<h1>PC Builder</h1>

<input type="number" id="budget" placeholder="Orçamento €">
<button onclick="buildPC()">Gerar</button>

<p id="result"></p>

<script>
function buildPC() {
  let budget = document.getElementById("budget").value;
  let result = "";

  if (budget < 500) {
    result = "Orçamento muito baixo";
  } else if (budget < 800) {
    result = "Build básica<br>Ryzen 5 + GTX 1660";
  } else {
    result = "Build boa<br>Ryzen 5 5600 + RX 6600";
  }

  document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
