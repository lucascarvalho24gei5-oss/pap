<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder 💻</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            color: #00ffcc;
        }

        input {
            padding: 10px;
            width: 200px;
            font-size: 16px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-left: 10px;
        }

        button:hover {
            background: #00ccaa;
        }

        .build {
            background: #222;
            margin: 20px auto;
            padding: 20px;
            width: 300px;
            border-radius: 10px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>PC Builder 💻</h1>
    <p>Insere o teu orçamento (€):</p>

    <input type="number" id="budget" placeholder="Ex: 1000">
    <button onclick="buildPC()">Gerar Build</button>

    <div id="result"></div>

            else if (budget < 700) {

            }

            else if (budget < 800) {
                result = `

            }

                result = `

</html>
