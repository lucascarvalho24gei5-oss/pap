<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildForge 💻</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0b1020, #050814);
            color: #e5e7eb;
            text-align: center;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #a78bfa;
        }

        p {
            margin-bottom: 20px;
            color: #94a3b8;
        }

        .input-container {
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: #a78bfa;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        button:hover {
            background: #7c3aed;
        }

        .build-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            max-width: 650px;
            margin: auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            text-align: left;
        }

        .build-card h2 {
            color: #a78bfa;
            margin-bottom: 20px;
        }

        .part {
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .part small {
            color: #94a3b8;
        }

        .part a {
            color: #34d399;
            text-decoration: none;
            font-weight: bold;
        }

        .fps {
            margin-top: 15px;
            padding: 12px;
            background: rgba(167,139,250,0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>BuildForge 💻</h1>
<p>Custom PC builds by budget</p>

<div class="input-container">
    <input type="number" id="budget" placeholder="Enter budget (€)">
    <button onclick="buildPC()">Generate Build</button>
</div>

<div id="result"></div>

<script>
function buildPC() {
    let budget = parseInt(document.getElementById("budget").value);
    let result = "";

    const amazon = "https://www.amazon.es/s?k=";
    const pcdiga = "https://www.pcdiga.com/search?query=";

    function part(name, info) {
        return `
        <div class="part">
            <strong>${name}</strong><br>
            <small>${info}</small><br><br>
            <a href="${amazon}${encodeURIComponent(name)}" target="_blank">Amazon</a> |
            <a href="${pcdiga}${encodeURIComponent(name)}" target="_blank">PCDiga</a>
        </div>`;
    }

    function fps(f1,f2,f3,f4){
        return `<div class="fps">
            <strong>Estimated FPS 🎮</strong><br>
            Fortnite: ${f1}<br>
            Warzone: ${f2}<br>
            GTA V: ${f3}<br>
            Valorant: ${f4}
        </div>`;
    }

    if (budget < 400) {
        result = `<div class='build-card'><h2>Minimum €400 required</h2></div>`;
    }

    else if (budget < 500) {
        result = `<div class="build-card"><h2>€400 - €499</h2>
        ${part("Ryzen 3 4100","Entry gaming CPU")}
        ${part("GTX 1050 Ti","Basic 1080p GPU")}
        ${part("16GB DDR4","Good for gaming")}
        ${part("480GB SSD","Basic storage")}
        ${part("A320 Motherboard","Entry board")}
        ${part("500W PSU","Basic power")}
        ${part("Case","Budget case")}
        ${fps(120,60,80,200)}
        </div>`;
    }

    else if (budget < 600) {
        result = `<div class="build-card"><h2>€500 - €599</h2>
        ${part("Ryzen 5 4500","Good budget CPU")}
        ${part("GTX 1650","Entry GPU")}
        ${part("16GB DDR4","Gaming RAM")}
        ${part("500GB NVMe","Fast storage")}
        ${part("A520 Motherboard","Upgrade path")}
        ${part("550W PSU","Stable power")}
        ${part("Case","Airflow case")}
        ${fps(140,70,90,220)}
        </div>`;
    }

    else if (budget < 700) {
        result = `<div class="build-card"><h2>€600 - €699</h2>
        ${part("Ryzen 5 5500","Solid gaming CPU")}
        ${part("RX 6500 XT","1080p GPU")}
        ${part("16GB DDR4","Standard RAM")}
        ${part("1TB NVMe","Fast SSD")}
        ${part("B450 Motherboard","Stable board")}
        ${part("550W PSU","Reliable PSU")}
        ${part("Case","Airflow case")}
        ${fps(160,80,100,240)}
        </div>`;
    }

    else if (budget < 800) {
        result = `<div class="build-card"><h2>€700 - €799</h2>
        ${part("Ryzen 5 5600","Great value CPU")}
        ${part("RX 6600","Best 1080p GPU")}
        ${part("16GB DDR4","Gaming standard")}
        ${part("1TB NVMe","Fast SSD")}
        ${part("B550 Motherboard","Good upgrade path")}
        ${part("650W PSU","Stable power")}
        ${part("Case","RGB airflow")}
        ${fps(180,90,120,300)}
        </div>`;
    }

    else if (budget < 900) {
        result = `<div class="build-card"><h2>€800 - €899</h2>
        ${part("i5-12400F","Strong Intel CPU")}
        ${part("RTX 3060","Great 1080p GPU")}
        ${part("16GB DDR4","Good RAM")}
        ${part("1TB NVMe","Fast storage")}
        ${part("B660 Motherboard","Intel board")}
        ${part("650W PSU","Stable PSU")}
        ${part("Case","Mid tower")}
        ${fps(200,100,130,320)}
        </div>`;
    }

    else if (budget < 1000) {
        result = `<div class="build-card"><h2>€900 - €999</h2>
        ${part("Ryzen 5 7600","AM5 CPU")}
        ${part("RTX 4060","Modern GPU")}
        ${part("32GB DDR5","Fast RAM")}
        ${part("1TB NVMe","Fast SSD")}
        ${part("B650 Motherboard","AM5 board")}
        ${part("750W PSU","Efficient PSU")}
        ${part("Case","Airflow")}
        ${fps(240,120,160,450)}
        </div>`;
    }

    else if (budget < 1200) {
        result = `<div class="build-card"><h2>€1000 - €1199</h2>
        ${part("Ryzen 7 7700","Strong CPU")}
        ${part("RTX 4060 Ti","Better GPU")}
        ${part("32GB DDR5","Fast RAM")}
        ${part("1TB NVMe","Fast SSD")}
        ${part("B650 Motherboard","AM5 board")}
        ${part("750W PSU","Gold PSU")}
        ${part("Case","Premium case")}
        ${fps(260,130,170,500)}
        </div>`;
    }

    else if (budget < 1500) {
        result = `<div class="build-card"><h2>€1200 - €1499</h2>
        ${part("Ryzen 7 7800X3D","Best gaming CPU")}
        ${part("RTX 4070","1440p GPU")}
        ${part("32GB DDR5","High speed RAM")}
        ${part("2TB NVMe","Large storage")}
        ${part("X670 Motherboard","High-end board")}
        ${part("850W PSU","Strong PSU")}
        ${part("Case","Premium case")}
        ${fps(320,160,190,500)}
        </div>`;
    }

    else if (budget < 2000) {
        result = `<div class="build-card"><h2>€1500 - €1999</h2>
        ${part("i7-14700K","High-end CPU")}
        ${part("RTX 4070 Ti Super","High GPU")}
        ${part("32GB DDR5","Fast RAM")}
        ${part("2TB NVMe","Storage")}
        ${part("Z790 Motherboard","Intel high-end")}
        ${part("850W PSU","Strong PSU")}
        ${part("Case","Premium case")}
        ${fps(380,180,220,600)}
        </div>`;
    }

    else if (budget < 3000) {
        result = `<div class="build-card"><h2>€2000 - €2999</h2>
        ${part("Ryzen 9 7950X3D","Top CPU")}
        ${part("RTX 4080 Super","4K GPU")}
        ${part("64GB DDR5","Extreme RAM")}
        ${part("4TB NVMe","Huge storage")}
        ${part("X670E Motherboard","Enthusiast")}
        ${part("1000W PSU","Powerful PSU")}
        ${part("Case","Showcase case")}
        ${fps(450,220,260,700)}
        </div>`;
    }

    else {
        result = `<div class="build-card"><h2>€3000+</h2>
        ${part("RTX 4090 Build","Extreme performance")}
        ${part("64GB DDR5","Ultra RAM")}
        ${part("8TB NVMe","Massive storage")}
        ${part("1200W PSU","Extreme power")}
        ${part("Full Tower","Premium case")}
        ${fps(600,300,350,900)}
        </div>`;
    }

    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
