<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildForge AI 💻</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top left, #0a0f2c, #05010f);
            color: #e5e7eb;
            text-align: center;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #00f5ff, #ff2bd6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin-bottom: 20px;
            color: #a5b4fc;
        }

        .input-container {
            margin-bottom: 30px;
        }

        textarea {
            padding: 15px;
            width: 100%;
            max-width: 650px;
            height: 120px;
            border-radius: 16px;
            font-size: 16px;
            outline: none;
            background: rgba(255,255,255,0.08);
            color: white;
            border: 1px solid rgba(0,245,255,0.3);
            resize: none;
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            background: linear-gradient(90deg, #00f5ff, #ff2bd6);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        button:hover {
            transform: scale(1.05);
        }

        .build-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(14px);
            max-width: 750px;
            margin: auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 0px 25px rgba(0,245,255,0.15);
            text-align: left;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .build-card h2 {
            color: #00f5ff;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<h1>BuildForge AI 💻</h1>
<p>Ask for a custom gaming PC build and let AI recommend the parts</p>

<div class="input-container">
    <textarea id="userPrompt" placeholder="Example: I have €1200 and want a gaming PC"></textarea>
    <br>
    <button onclick="askAI()">Ask AI</button>
</div>

<div id="result"></div>

<script>
async function askAI() {
    const prompt = document.getElementById("userPrompt").value.trim();
    const resultDiv = document.getElementById("result");

    if (!prompt) {
        resultDiv.innerHTML = `
            <div class="build-card">
                <h2>Write your request first 🤖</h2>
                Example: I have €900 and want a PC for Fortnite.
            </div>
        `;
        return;
    }

    resultDiv.innerHTML = `
        <div class="build-card">
            <h2>Thinking... 🤖</h2>
            Building your custom PC recommendation...
        </div>
    `;

    try {
        const response = await fetch("http://localhost:3000/ask", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: prompt
            })
        });

        const data = await response.json();

        resultDiv.innerHTML = `
            <div class="build-card">
                <h2>BuildForge AI Recommendation 🤖</h2>
                ${data.reply}
            </div>
        `;
    } catch (error) {
        resultDiv.innerHTML = `
            <div class="build-card">
                <h2>Error ❌</h2>
                Make sure your server is running with: node server.js
            </div>
        `;
    }
}
</script>

</body>
</html>
