<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuildForge 💻</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #0b1020, #050814);
            color: #e5e7eb;
            text-align: center;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #a78bfa;
        }

        p {
            margin-bottom: 20px;
            color: #94a3b8;
        }

        .input-container {
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background: #a78bfa;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        button:hover {
            background: #7c3aed;
        }

        .build-card {
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(12px);
            max-width: 650px;
            margin: auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.5);
            text-align: left;
        }

        .build-card h2 {
            color: #a78bfa;
            margin-bottom: 20px;
        }

        .part {
            margin-bottom: 12px;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .part small {
            color: #94a3b8;
        }

        .part a {
            color: #34d399;
            text-decoration: none;
            font-weight: bold;
        }

        .part a:hover {
            text-decoration: underline;
        }

        .fps {
            margin-top: 15px;
            padding: 12px;
            background: rgba(167,139,250,0.15);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <h1>BuildForge 💻</h1>
    <p>Custom PC builds by budget</p>

    <div class="input-container">
        <input type="number" id="budget" placeholder="Enter budget (€)">
        <button onclick="buildPC()">Generate Build</button>
    </div>

    <div id="result"></div>

    <script>
        function buildPC() {
            let budget = parseInt(document.getElementById("budget").value);
            let result = "";

            const amazon = "https://www.amazon.es/s?k=";
            const pcdiga = "https://www.pcdiga.com/search?query=";

            function part(name, info) {
                return `
                    <div class="part">
                        <strong>${name}</strong><br>
                        <small>${info}</small><br><br>
                        <a href="${amazon}${encodeURIComponent(name)}" target="_blank">Amazon</a> |
                        <a href="${pcdiga}${encodeURIComponent(name)}" target="_blank">PCDiga</a>
                    </div>
                `;
            }

            function fps(f1,f2,f3,f4){
                return `<div class="fps">
                    <strong>Estimated FPS 🎮</strong><br>
                    Fortnite: ${f1}<br>
                    Warzone: ${f2}<br>
                    GTA V: ${f3}<br>
                    Valorant: ${f4}
                </div>`;
            }

            if (budget < 400) {
                result = `<div class='build-card'><h2>Minimum €400 required</h2></div>`;
            }

            else if (budget < 800) {
                result = `
                <div class="build-card">
                    <h2>Budget Build</h2>
                    ${part("Ryzen 5 5600","6c/12t great value gaming CPU")}
                    ${part("RX 6600","Excellent 1080p GPU")}
                    ${part("16GB DDR4","Smooth gaming performance")}
                    ${part("1TB NVMe SSD","Fast loading times")}
                    ${part("B550 Motherboard","Upgrade friendly")}
                    ${part("650W PSU","Stable power")}
                    ${part("Gaming Case","Good airflow")}
                    ${fps("180","90","120","300")}
                </div>`;
            }

            else if (budget < 1500) {
                result = `
                <div class="build-card">
                    <h2>Mid Range Build</h2>
                    ${part("Ryzen 5 7600","Modern AM5 CPU")}
                    ${part("RTX 4060","Great 1080p/1440p GPU")}
                    ${part("32GB DDR5","Future proof RAM")}
                    ${part("1TB NVMe SSD","Fast storage")}
                    ${part("B650 Motherboard","AM5 platform")}
                    ${part("750W Gold PSU","Efficient power")}
                    ${part("Airflow Case","Premium cooling")}
                    ${fps("240","120","160","450")}
                </div>`;
            }

            else {
                result = `
                <div class="build-card">
                    <h2>High End Build</h2>
                    ${part("Ryzen 7 7800X3D","Top gaming CPU")}
                    ${part("RTX 4070 Super","1440p ultra performance")}
                    ${part("32GB DDR5","High speed RAM")}
                    ${part("2TB NVMe SSD","Large fast storage")}
                    ${part("X670 Motherboard","Premium board")}
                    ${part("850W Gold PSU","Reliable power")}
                    ${part("Premium Case","High airflow")}
                    ${fps("320","160","190","500")}
                </div>`;
            }

            document.getElementById("result").innerHTML = result;
        }
    </script>

</body>
</html>
