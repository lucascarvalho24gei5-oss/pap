<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .input-container {
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            background: #38bdf8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        button:hover {
            background: #0284c7;
        }

        .build-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            text-align: left;
        }

        .build-card h2 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .part {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .part a {
            color: #22c55e;
            text-decoration: none;
            font-weight: bold;
        }

        .part a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>PC Builder Pro 💻</h1>
    <p>Find the best gaming PC build for your budget</p>

    <div class="input-container">
        <input type="number" id="budget" placeholder="Enter budget (€)">
        <button id="generateBtn">Generate Build</button>
    </div>

    <div id="result"></div>

    <script>
function buildPC() {
    let budget = parseInt(document.getElementById("budget").value);
    let result = "";

    if (isNaN(budget)) {
        document.getElementById("result").innerHTML =
            "<div class='build-card'><h2>Please enter a valid budget</h2></div>";
        return;
    }

    const amazon = "https://www.amazon.es/s?k=";
    const pcdiga = "https://www.pcdiga.com/search?query=";

    function part(name, info) {
        return `
            <div class="part">
                <strong>${name}</strong><br>
                <small style="color:#cbd5e1;">${info}</small><br><br>
                
                <a href="${amazon}${encodeURIComponent(name)}" target="_blank">
                    Amazon
                </a> |
                
                <a href="${pcdiga}${encodeURIComponent(name)}" target="_blank">
                    PCDiga
                </a>
            </div>
        `;
    }

    function fpsInfo(fortnite, warzone, gta, valorant) {
        return `
            <div class="part" style="background: rgba(56,189,248,0.15);">
                <h3>Estimated FPS 🎮</h3>
                <p>Fortnite: ${fortnite} FPS</p>
                <p>Warzone: ${warzone} FPS</p>
                <p>GTA V: ${gta} FPS</p>
                <p>Valorant: ${valorant} FPS</p>
            </div>
        `;
    }

    if (budget < 400) {
        result = `
        <div class="build-card">
            <h2>Budget too low ❌</h2>
            <p>Try at least €400</p>
        </div>`;
    }

    else if (budget < 800) {
        result = `
        <div class="build-card">
            <h2>Budget Build (€400-799)</h2>

            ${part("Ryzen 5 5600", "6 cores / 12 threads - great value CPU")}
            ${part("RX 6600", "Excellent 1080p gaming GPU")}
            ${part("16GB DDR4 RAM", "Enough for modern gaming")}
            ${part("1TB NVMe SSD", "Fast storage")}
            ${part("B550 Motherboard", "Good upgrade path")}
            ${part("650W PSU", "Reliable power supply")}
            ${part("Kolink Observatory Case", "RGB airflow case")}

            ${fpsInfo(180, 90, 120, 300)}
        </div>`;
    }

    else if (budget < 1500) {
        result = `
        <div class="build-card">
            <h2>Mid Range Build (€800-1499)</h2>

            ${part("Ryzen 5 7600", "Modern AM5 gaming CPU")}
            ${part("RTX 4060", "Great 1080p/1440p GPU")}
            ${part("32GB DDR5 RAM", "Future-proof RAM")}
            ${part("1TB NVMe SSD", "Fast load times")}
            ${part("B650 Motherboard", "AM5 platform")}
            ${part("750W Gold PSU", "Efficient PSU")}
            ${part("NZXT H5 Flow", "Premium airflow case")}

            ${fpsInfo(240, 120, 160, 450)}
        </div>`;
    }

    else if (budget < 3000) {
        result = `
        <div class="build-card">
            <h2>High-End Build (€1500-2999)</h2>

            ${part("Ryzen 7 7800X3D", "One of the best gaming CPUs")}
            ${part("RTX 4070 Ti Super", "Excellent 1440p GPU")}
            ${part("32GB DDR5 RAM", "High performance memory")}
            ${part("2TB NVMe SSD", "Large fast storage")}
            ${part("X670 Motherboard", "Premium motherboard")}
            ${part("850W Gold PSU", "Upgrade-ready")}
            ${part("Corsair 4000D", "Premium case")}

            ${fpsInfo(320, 160, 190, 500)}
        </div>`;
    }

    else {
        result = `
        <div class="build-card">
            <h2>Extreme Build (€3000+)</h2>

            ${part("Ryzen 9 7950X3D", "Extreme gaming/workstation CPU")}
            ${part("RTX 4090", "Best GPU available")}
            ${part("64GB DDR5 RAM", "Heavy multitasking")}
            ${part("4TB NVMe SSD", "Huge storage")}
            ${part("X670E Motherboard", "Enthusiast board")}
            ${part("1200W PSU", "Maximum power")}
            ${part("Lian Li O11 Dynamic", "Premium showcase case")}

            ${fpsInfo(500, 220, 300, 800)}
        </div>`;
    }

    document.getElementById("result").innerHTML = result;
}
</script>

</body>
</html>
