<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Builder Pro</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
            min-height: 100vh;
            padding: 30px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .input-container {
            margin-bottom: 30px;
        }

        input {
            padding: 12px;
            width: 220px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            background: #38bdf8;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-left: 10px;
        }

        button:hover {
            background: #0284c7;
        }

        .build-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: auto;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            text-align: left;
        }

        .build-card h2 {
            color: #38bdf8;
            margin-bottom: 20px;
        }

        .part {
            margin-bottom: 15px;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .part a {
            color: #22c55e;
            text-decoration: none;
            font-weight: bold;
        }

        .part a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <h1>PC Builder Pro 💻</h1>
    <p>Find the best gaming PC build for your budget</p>

    <div class="input-container">
        <input type="number" id="budget" placeholder="Enter budget (€)">
        <button id="generateBtn">Generate Build</button>
    </div>

    <div id="result"></div>

    <script>
        window.buildPC = function() {
            const budgetValue = document.getElementById("budget").value;
            const budget = Number(budgetValue);
            const resultDiv = document.getElementById("result");

            if (!budgetValue || isNaN(budget)) {
                resultDiv.innerHTML = `
                    <div class="build-card">
                        <h2>Enter a valid budget 💸</h2>
                        <p>Example: 800, 1200, 2000</p>
                    </div>`;
                return;
            }

            const builds = [
                {
                    min: 400,
                    max: 799,
                    title: "Budget Build (€400-799)",
                    parts: [
                        part("Ryzen 5 5600", "6 cores / 12 threads - great value"),
                        part("RX 6600", "Excellent 1080p gaming GPU"),
                        part("16GB DDR4 RAM", "Perfect for gaming"),
                        part("1TB NVMe SSD", "Fast loading times"),
                        part("B550 Motherboard", "Good upgrade path"),
                        part("650W PSU", "Reliable power supply"),
                        part("Kolink Observatory Case", "RGB airflow case")
                    ],
                    fps: fpsInfo(180, 90, 120, 300)
                },
                {
                    min: 800,
                    max: 1499,
                    title: "Mid Range Build (€800-1499)",
                    parts: [
                        part("Ryzen 5 7600", "Modern AM5 CPU"),
                        part("RTX 4060", "Great 1080p/1440p GPU"),
                        part("32GB DDR5 RAM", "Future-proof RAM"),
                        part("1TB NVMe SSD", "Fast storage"),
                        part("B650 Motherboard", "AM5 support"),
                        part("750W Gold PSU", "Efficient PSU"),
                        part("NZXT H5 Flow", "Premium airflow case")
                    ],
                    fps: fpsInfo(240, 120, 160, 450)
                },
                {
                    min: 1500,
                    max: 999999,
                    title: "High-End Build (€1500+)",
                    parts: [
                        part("Ryzen 7 7800X3D", "One of the best gaming CPUs"),
                        part("RTX 4070 Super", "Excellent 1440p GPU"),
                        part("32GB DDR5 RAM", "High-performance memory"),
                        part("2TB NVMe SSD", "Large fast storage"),
                        part("X670 Motherboard", "High-end AM5 board"),
                        part("850W Gold PSU", "Ready for upgrades"),
                        part("Corsair 4000D", "Popular premium case")
                    ],
                    fps: fpsInfo(320, 160, 190, 500)
                }
            ];

            const selectedBuild = builds.find(build => budget >= build.min && budget <= build.max);

            if (!selectedBuild) {
                resultDiv.innerHTML = `
                    <div class="build-card">
                        <h2>Budget too low ❌</h2>
                        <p>Minimum recommended budget is €400.</p>
                    </div>`;
                return;
            }

            resultDiv.innerHTML = `
                <div class="build-card">
                    <h2>${selectedBuild.title}</h2>
                    ${selectedBuild.parts.join("")}
                    ${selectedBuild.fps}
                </div>`;
        }
    
        // safer than inline onclick
        document.getElementById("generateBtn").addEventListener("click", window.buildPC);
    </script>

</body>
</html>
